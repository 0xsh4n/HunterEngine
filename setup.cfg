[flake8]
max-line-length = 120
exclude =
    env,
    venv,
    .venv,
    __pycache__,
    build,
    dist,
    data,
    .git
extend-ignore = E203, W503
per-file-ignores =
    __init__.py:F401

[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_return_any = True
warn_unused_configs = True

# NOTE: pytest configuration lives in pyproject.toml ([tool.pytest.ini_options]).
# Keeping it in one place avoids the "ignoring pytest config in setup.cfg" warning.
