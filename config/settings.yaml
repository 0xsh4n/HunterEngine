general:
  concurrency: 20
  timeout: 30
  retries: 2
  user_agent: random
  data_dir: data
  verbose: false
  color_output: true
  strict_failures: false
testing:
  profile: blackbox
  account_testing:
    enabled: false
    submit_signup: false
    email_domain: example.invalid
knowledge:
  enabled: true
  index_path: data/knowledge/index.json
  chunk_size: 1200
  chunk_overlap: 180
rate_limiting:
  requests_per_second: 10
  per_host_rps: 5
  burst_size: 20
  adaptive: true
  backoff_factor: 2.0
  backoff_max: 120
safety:
  active_testing:
    allowed_methods:
    - GET
    - HEAD
    - OPTIONS
    allow_authenticated_requests: false
    max_response_bytes: 1000000
    max_failures_per_host: 4
    max_server_errors_per_host: 3
    cooldown_seconds: 90
    max_request_seconds: 15
    profile: blackbox
    max_total_requests: 500
    max_requests_per_host: 100
    max_consecutive_timeouts: 3
proxy:
  enabled: true
  listen_host: 127.0.0.1
  listen_port: 8080
  auto_port: true
  upstream_proxy: ''
  log_requests: true
  intercept_mode: false
browser:
  headless: true
  chromium_args:
  - --disable-gpu
  - --no-sandbox
  - --disable-dev-shm-usage
  page_timeout: 30000
  screenshot_on_finding: true
  screenshot_dir: data/screenshots
waf_bypass:
  ip_rotation:
    enabled: false
    provider: aws
    regions:
    - us-east-1
    - us-west-2
    - eu-west-1
  tls_impersonation:
    enabled: false
    browser: chrome
  ua_rotation: true
  referrer_spoof: true
  delay_range:
  - 0.5
  - 2.0
recon:
  subdomain_threads: 10
  concurrency: 10
  max_root_domains: 5000
  dns_wordlist: config/wordlists/subdomains.txt
  resolve_all: true
  port_scan_top: 1000
crawl:
  max_depth: 5
  max_pages: 500
  respect_robots: false
  js_rendering: true
  form_fill: false
  param_wordlist: config/wordlists/params.txt
detection:
  modules:
    xss: true
    cors: true
    secrets: true
    jwt: true
    prototype_pollution: true
    ssrf: true
    idor: true
    graphql: true
    auth: true
    open_redirect: true
    csp: true
    subdomain_takeover: true
    dependency: true
    race_condition: true
    crypto: false
  confidence_threshold: 0.6
  concurrency: 6
  behaviour_driven: true
  nuclei_templates: ''
  nuclei_severity:
  - critical
  - high
  - medium
ai:
  enabled: true
  mode: both
  provider: ollama
  max_findings: 50
  min_confidence: 0.2
  concurrency: 2
  max_context_chars: 6000
  redact_sensitive: true
  local_model:
    base_url: http://10.3.20.55:11434/
    model: qwen3:4b
    timeout: 45
    temperature: 0.1
    api_key_env: ''
  testing_model:
    base_url: http://10.3.20.55:11434/
    model: qwen3:4b
    timeout: 90
    temperature: 0.2
    think: true
    num_ctx: 8192
    num_predict: 1536
    api_key_env: ''
  testing:
    enabled: true
    generated_agent: false
    planner_deadline: 50
    concurrency: 3
    max_endpoints: 40
    max_probes_per_agent: 8
    max_total_probes: 60
    min_confidence: 0.55
    domain_learning: true
    subagents:
    - xss
    - idor
    - ssti
    - ssrf
    - auth
    - open_redirect
    - request_smuggling
    - cors
    - jwt
reporting:
  format:
  - markdown
  - hackerone
  output_dir: data/reports
  include_evidence: true
  include_screenshots: true
  auto_triage: true
  evidence_dirs:
  - data/screenshots
  - data/eyewitness
  - data/gowitness
database:
  backend: sqlite
  sqlite_path: data/findings.db
  memory_db_path: data/memory.db
