name: Bug Report
description: Report a bug or unexpected behavior in HunterEngine
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Configure scope.yaml with ...
        2. Run `python main.py scan --auto-crawl --headed`
        3. Wait for crawl phase to start
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant terminal output or error messages.
      render: shell

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.11.5"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11 / Ubuntu 22.04 / macOS 14"

  - type: input
    id: hunterengine-version
    attributes:
      label: HunterEngine Version
      placeholder: "2.0.0"
