name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: I'm always frustrated when ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Recon
        - Crawling / Auto-Navigator
        - Detection
        - AI Triage
        - Reporting
        - Core / Orchestrator
        - CLI / UX
        - Documentation
        - Other
